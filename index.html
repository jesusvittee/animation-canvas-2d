<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./assets/img/favicon.png" type="image/x-icon">
  <title>Canvas POO - Jesús Vite</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS externo -->
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>

  <!-- 🔝 NAVBAR -->
  <nav class="navbar navbar-dark bg-dark shadow">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">🎨 Canvas POO</span>
      <span class="text-white">Jesús Vite - ISC</span>
    </div>
  </nav>

  <!-- 🧩 CONTENIDO -->
  <div class="container my-4">

    <div class="glass p-4">
      <h4 class="text-white mb-3">Controles</h4>

      <div class="row g-3">

        <div class="col-md-3">
          <label class="form-label text-white">Número de círculos</label>
          <input type="number" id="numCircles" class="form-control" min="1" max="100" value="5">
        </div>

        <div class="col-md-3">
          <label class="form-label text-white">Ancho canvas</label>
          <input type="number" id="canvasWidth" class="form-control" value="600">
        </div>

        <div class="col-md-3">
          <label class="form-label text-white">Alto canvas</label>
          <input type="number" id="canvasHeight" class="form-control" value="400">
        </div>
      
       <div class="col-md-3">
  <label class="form-label text-white">Dirección</label>
  <select id="direction" class="form-select">
    <option value="top">Desde arriba</option>
    <option value="left">Desde izquierda</option>
    <option value="right">Desde derecha</option>
    <option value="bottom">Desde abajo</option>
  </select>
</div>

        <div class="col-md-3 d-flex align-items-end">
          <button class="btn btn-primary w-100" onclick="aplicarCambios()">Aplicar</button>
        </div>

      </div>
    </div>

</div>

    <!-- 🎯 CANVAS -->
    <div class="glass p-3 mt-4 text-center">
      <canvas id="canvas"></canvas>
    </div>

  </div>

  <!-- 🔻 FOOTER -->
  <footer class="footer text-white text-center p-3">
    <p class="mb-0">Desarrollado por Jesús Vite | Ingeniería en Sistemas Computacionales</p>
  </footer>

  <script src="./assets/js/main.js"></script>
</body>
</html>
